<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sugar-Free Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    .app {
      max-width: 520px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    video {
      width: 100%;
      border-radius: 14px;
      background: #000;
      margin-top: 15px;
    }

    button, input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
      border: none;
    }

    .card {
      background: #f1f3f5;
      padding: 14px;
      border-radius: 14px;
      margin-top: 14px;
    }

    .danger {
      background: #ffe1e1;
    }

    .safe {
      background: #ddf7df;
    }

    .small {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Supermarket Sugar Scanner</h1>
    <p class="small">
      Scan a barcode to check sugar content and find safer no-sugar alternatives.
    </p>

    <video id="video" autoplay playsinline></video>

    <button onclick="startCamera()">Start Camera Scan</button>

    <input id="manualBarcode" placeholder="Or enter barcode manually" />
    <button onclick="lookupManual()">Check Product</button>

    <div id="result"></div>
  </div>

  <script>
    const video = document.getElementById("video");
    const result = document.getElementById("result");

    const sugarFreeAlternatives = [
      {
        name: "Sparkling Water",
        reason: "No sugar, similar drink option"
      },
      {
        name: "Zero Sugar Cola",
        reason: "Sweet taste without sugar"
      },
      {
        name: "Unsweetened Iced Tea",
        reason: "Low-calorie and no added sugar"
      },
      {
        name: "Plain Yogurt",
        reason: "Better alternative to sweetened dairy snacks"
      }
    ];

    async function startCamera() {
      result.innerHTML = "<div class='card'>Starting camera...</div>";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });

        video.srcObject = stream;

        if (!("BarcodeDetector" in window)) {
          result.innerHTML = `
            <div class="card danger">
              Barcode scanning is not supported in this browser.
              Please enter the barcode manually.
            </div>
          `;
          return;
        }

        const detector = new BarcodeDetector({
          formats: ["ean_13", "ean_8", "upc_a", "upc_e"]
        });

        scanLoop(detector);

      } catch (error) {
        result.innerHTML = `
          <div class="card danger">
            Camera access failed. Use HTTPS and allow camera permission.
          </div>
        `;
      }
    }

    async function scanLoop(detector) {
      try {
        const barcodes = await detector.detect(video);

        if (barcodes.length > 0) {
          const barcode = barcodes[0].rawValue;
          await fetchProduct(barcode);
          return;
        }

        requestAnimationFrame(() => scanLoop(detector));
      } catch {
        requestAnimationFrame(() => scanLoop(detector));
      }
    }

    function lookupManual() {
      const barcode = document.getElementById("manualBarcode").value.trim();

      if (!barcode) {
        result.innerHTML = "<div class='card danger'>Please enter a barcode.</div>";
        return;
      }

      fetchProduct(barcode);
    }

    async function fetchProduct(barcode) {
      result.innerHTML = `<div class="card">Checking barcode: ${barcode}</div>`;

      try {
        const response = await fetch(
          `https://world.openfoodfacts.org/api/v2/product/${barcode}.json`
        );

        const data = await response.json();

        if (!data.product) {
          result.innerHTML = `
            <div class="card danger">
              Product not found. Try another barcode.
            </div>
          `;
          return;
        }

        const product = data.product;
        const name = product.product_name || "Unknown product";
        const sugars = product.nutriments?.sugars_100g;

        showProductResult(name, sugars);

      } catch {
        result.innerHTML = `
          <div class="card danger">
            Could not fetch product data.
          </div>
        `;
      }
    }

    function showProductResult(name, sugars) {
      const hasSugar = sugars && Number(sugars) > 0;

      let html = `
        <div class="card ${hasSugar ? "danger" : "safe"}">
          <h2>${name}</h2>
          <p><strong>Sugar:</strong> ${sugars ?? "Unknown"} g per 100g</p>
          <p>
            ${hasSugar
              ? "This product contains sugar. Consider safer alternatives below."
              : "This product appears to be sugar-free or has no listed sugar."}
          </p>
        </div>
      `;

      if (hasSugar) {
        html += `<h3>Suggested no-sugar alternatives</h3>`;

        sugarFreeAlternatives.forEach(item => {
          html += `
            <div class="card safe">
              <strong>${item.name}</strong>
              <p>${item.reason}</p>
            </div>
          `;
        });
      }

      result.innerHTML = html;
    }
  </script>
</body>
</html>
